services:
  #  postgres db & postgres admin panel
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blog-new-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: youremail@gmail.com
      PGADMIN_DEFAULT_PASSWORD: your_password
      PGADMIN_LISTEN_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - live
  postgres:
    image: postgres:latest
    container_name: blog-new-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: blog
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - live
  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: blog-new-backend
    volumes:
      - ./src:/app/
    environment:
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DEBUG=True
      - SECRET_KEY=HereIsYourSecret_Keyqweroqpowek12312313
      - PostgresUser=admin
      - PostgresPass=admin
      - PostgresHost=postgres
      - PostgresPort=5432
      - PostgresName=blog
      - RedisHost=redis
      - RedisPort=6379
      - RedisDB=1
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    # following command is used in production mode
    # command: sh -c "python manage.py migrate && gunicorn -c gunicorn.conf.py Auth.wsgi:application"
    networks:
      - live
    restart: on-failure
    depends_on:
      - postgres
      - redis
  redis:
    image: redis:7.0.11-alpine
    container_name: blog-new-redis
    networks:
      - live

volumes:
  postgres_data:
networks:
  live:

